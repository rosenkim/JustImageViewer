# Just Image Viewer — default configuration
# Copy is automatically created in the platform config directory on first launch.

restore_last_directory = true
# last_open_file is managed by the app and stores the last selected file path.
# slideshow_interval_secs = 5
# Font file name under assets/fonts (leave empty for built-in ImGui font)
ui_font_filename = ""
# UI font size in points (pt)
ui_font_size_pt = 10.5
#! Global UI scale factor (1.0 = 100%)
ui_scale_factor = 1.0
# ImGui theme: "dark", "light", or "classic"
imgui_theme = "dark"
# UI layout + viewing options persisted between runs
show_library = true
show_info = true
show_selection_window = false
library_width = 300.0
image_view_mode = "fit_to_window"
library_sort_field = "name"
sort_direction = "ascending"
show_thumbnail = true
# Maximum number of images kept in memory cache
image_cache_count = 32
# Rendering FPS while window is focused
focused_fps = 60
# Rendering FPS while window is unfocused
unfocused_fps = 5
# Optional local HTTP server port (0 disables server)
# http_port = 0

[background_style]
# mode can be "checker" or "solid"
mode = "checker"
# color format is #RRGGBB
# solid mode uses only color1
color1 = "#CCCCCC"
# checker mode alternates color1 and color2
color2 = "#FFFFFF"
