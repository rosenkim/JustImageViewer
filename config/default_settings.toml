# Vibe Image Viewer — default configuration
# Copy is automatically created in the platform config directory on first launch.

restore_last_directory = true
# last_open_directory is managed by the app and populated after opening a directory.
# slideshow_interval_secs = 5
# Font file name under assets/fonts
ui_font_filename = "NanumGothic.ttf"
# UI font size in pixels
ui_font_size_pixels = 14.0
#! Global UI scale factor (1.0 = 100%)
ui_scale_factor = 1.0
# UI layout + viewing options persisted between runs
show_library = true
show_info = true
show_selection_window = false
library_width = 300.0
image_view_mode = "fit_to_window"
library_sort_field = "name"
sort_direction = "ascending"
show_thumbnail = true
# Maximum number of images kept in memory cache
image_cache_count = 32

[texture]
# Maximum number of cached textures
texture_cache_max_entries = 4

[background_style]
# mode can be "checker" or "solid"
mode = "checker"
# brightness in the 0.0..=1.0 range controls neutral grey level
brightness = 0.5
